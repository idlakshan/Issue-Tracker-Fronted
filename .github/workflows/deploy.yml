name: Build and Deploy Frontend

on:
  push:
    branches:
      - dev 

jobs:
  build-and-push:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            --build-arg VITE_BASE_URL="${{ secrets.VITE_BASE_URL }}" \
            -t idlakshan/issuetracker_frontend:latest .

      - name: Push to Docker Hub
        run: docker push idlakshan/issuetracker_frontend:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted   

    steps:
      - name: Pull image from docker hub
        run: docker pull idlakshan/issuetracker_frontend:latest

      - name: Delete old container if exists
        run: docker rm -f issuetracker_frontend-container || true
      
      - name: Run docker container
        run: |
          docker run -d \
          -p 80:80 \
          --name issuetracker_frontend-container \
          --restart always \
          idlakshan/issuetracker_frontend:latest